<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>旅のしおり</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=BIZ+UDGothic:wght@400;700&family=BIZ+UDPGothic:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#1F3A4D;
  --blue:#1C6FA5;
  --blue-dark:#144F79;
  --pink:#B2394F;
  --pink-dark:#8C2C3D;
  --green:#217A57;
  --red:#B23B2E;
  --bg:#F2F4F6;
  --card:#FFFFFF;
  --border:#C6CDD3;
  --text:#1F3A4D;
  --text-sub:#4C5A66;
  --gray-btn:#E7EAED;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;height:auto;background:#F2F4F6;}
body{
  background:var(--bg);
  color:var(--text);
  font-family:'BIZ UDPGothic','BIZ UDGothic',sans-serif;
  font-size:15px;
  -webkit-font-smoothing:antialiased;
  -webkit-overflow-scrolling:touch;
  overflow-x:hidden;
  touch-action:pan-y;
}
#app{max-width:480px;margin:0 auto;background:var(--bg);position:relative;padding-bottom:max(40px, env(safe-area-inset-bottom));}
h1,h2,h3{font-family:'BIZ UDGothic',sans-serif;margin:0;color:var(--navy);}
button{font-family:inherit;}
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 16px;background:var(--card);border-bottom:1px solid var(--border);
  position:relative;z-index:20;
}
.topbar h1{font-size:18px;font-weight:700;}
.icon-btn{
  background:none;border:none;cursor:pointer;padding:6px;color:var(--navy);
  display:flex;align-items:center;justify-content:center;
}
.icon-btn svg{width:22px;height:22px;}

/* Buttons */
.btn-primary{
  background:var(--blue);color:#fff;border:none;border-radius:14px;
  padding:12px 16px;font-size:14.5px;font-weight:700;cursor:pointer;
  box-shadow:0 3px 8px rgba(28,111,165,0.25);
}
.btn-secondary{
  background:var(--gray-btn);color:var(--navy);border:none;border-radius:14px;
  padding:12px 16px;font-size:14.5px;font-weight:700;cursor:pointer;
}
.btn-small{
  background:var(--blue);color:#fff;border:none;border-radius:10px;
  padding:8px 12px;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0;
}
.link-danger{
  color:var(--red);text-decoration:underline;background:none;border:none;
  cursor:pointer;font-size:13px;font-family:inherit;padding:0;
}
.full-width{width:100%;}

/* Cards */
.card{
  background:var(--card);border:1px solid var(--border);border-radius:16px;
  padding:14px;margin-bottom:10px;
}
.section-title{
  display:flex;align-items:center;gap:6px;font-size:14.5px;font-weight:700;
  color:var(--navy);margin:18px 16px 8px;
}

/* Home */
.home-content{padding:14px 16px;}
.countdown-card{
  background:var(--blue-dark);border-radius:20px;padding:22px 16px;text-align:center;
  color:#fff;margin-bottom:6px;
}
.countdown-emoji{font-size:38px;}
.countdown-days{font-size:24px;font-weight:700;margin-top:6px;}
.countdown-name{font-size:15px;font-weight:700;margin-top:8px;}
.countdown-dest{font-size:12px;opacity:0.9;margin-top:4px;}
.countdown-range{font-size:11px;opacity:0.85;margin-top:2px;}
.empty-card{
  background:var(--card);border:1px dashed var(--border);border-radius:20px;
  padding:30px 16px;text-align:center;color:var(--text-sub);
}
.empty-card h2{font-size:16px;margin-bottom:6px;}
.empty-card p{font-size:13px;margin:0 0 14px;}

.schedule-item{
  display:flex;gap:10px;background:var(--card);border:1px solid var(--border);
  border-radius:14px;padding:10px 12px;margin-bottom:8px;
}
.schedule-time-col{min-width:52px;text-align:left;}
.schedule-time-main{font-weight:700;color:var(--blue-dark);font-size:14px;}
.schedule-time-sub{font-size:11px;color:var(--text-sub);margin-top:2px;}
.schedule-body{flex:1;}
.cat-badge{
  display:inline-block;font-size:11px;font-weight:700;border-radius:8px;
  padding:2px 8px;margin-bottom:4px;
}
.schedule-title{font-weight:700;font-size:14px;}
.schedule-loc{font-size:12px;color:var(--text-sub);margin-top:2px;}
.jst-line{font-size:11px;color:var(--text-sub);margin-top:4px;border-top:1px dashed var(--border);padding-top:4px;}
.badge-nextday{
  display:inline-block;background:#EFE1E3;color:var(--pink-dark);
  font-size:10px;font-weight:700;border-radius:6px;padding:1px 5px;margin-left:4px;
}

.list-row{
  display:flex;align-items:center;gap:10px;background:var(--card);
  border:1px solid var(--border);border-radius:14px;padding:12px;margin-bottom:8px;cursor:pointer;
}
.chevron{opacity:0.35;font-size:16px;}
.empty-note{color:var(--text-sub);font-size:13px;text-align:center;padding:18px 0;}

.bottom-open-btn{
  display:block;width:calc(100% - 32px);margin:16px;background:#fff;color:var(--blue-dark);
  border:1.5px solid var(--blue);border-radius:14px;padding:13px;font-weight:700;font-size:14.5px;cursor:pointer;
}

/* Drawer */
.overlay{position:fixed;inset:0;background:rgba(20,30,40,0.4);z-index:40;display:none;pointer-events:none;}
.overlay.open{display:block;pointer-events:auto;}
.drawer{
  position:fixed;top:0;left:0;bottom:0;width:84%;max-width:360px;background:var(--bg);
  z-index:41;transform:translateX(-100%);transition:transform .25s ease;overflow-y:auto;
  pointer-events:none;
}
.drawer.open{transform:translateX(0);pointer-events:auto;}
.drawer-header{
  display:flex;align-items:center;justify-content:space-between;padding:16px;
  background:var(--card);border-bottom:1px solid var(--border);
}
.drawer-body{padding:14px 16px;}
.trip-card{
  display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--border);
  border-radius:14px;padding:12px;margin-bottom:8px;
}
.trip-card-emoji{font-size:26px;}
.trip-card-info{flex:1;cursor:pointer;}
.trip-card-name{font-weight:700;font-size:14px;}
.trip-card-dest{font-size:12px;color:var(--text-sub);margin-top:2px;}
.trip-card-range{font-size:11px;color:var(--text-sub);margin-top:1px;}

/* Tabs */
.tabbar{display:flex;overflow-x:auto;gap:6px;padding:10px 12px;background:var(--card);border-bottom:1px solid var(--border);position:relative;z-index:15;touch-action:pan-x;-webkit-overflow-scrolling:touch;}
.tab-btn{
  flex-shrink:0;background:var(--gray-btn);color:var(--text-sub);border:none;border-radius:12px;
  padding:8px 12px;font-size:12.5px;font-weight:700;cursor:pointer;
}
.tab-btn.active{background:var(--blue);color:#fff;}
.daytabbar{display:flex;overflow-x:auto;gap:6px;padding:10px 16px 0;touch-action:pan-x;-webkit-overflow-scrolling:touch;}
.day-btn{
  flex-shrink:0;background:#fff;border:1px solid var(--border);color:var(--text-sub);
  border-radius:10px;padding:7px 12px;font-size:12.5px;font-weight:700;cursor:pointer;
}
.day-btn.active{background:var(--blue-dark);color:#fff;border-color:var(--blue-dark);}

.detail-header{background:var(--card);border-bottom:1px solid var(--border);padding:14px 16px;}
.detail-header-top{display:flex;align-items:center;justify-content:space-between;}
.detail-title{font-size:17px;font-weight:700;}
.detail-sub{font-size:12px;color:var(--text-sub);margin-top:3px;}
.member-chip{
  display:inline-block;background:var(--gray-btn);color:var(--navy);font-size:12px;font-weight:700;
  border-radius:14px;padding:4px 10px;margin:8px 6px 0 0;
}

.tab-content{padding:14px 16px;}

/* form */
.form-group{margin-bottom:12px;}
.form-label{font-size:12.5px;font-weight:700;color:var(--text-sub);margin-bottom:5px;display:block;}
.form-row{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:10px;}
input[type=text],input[type=date],input[type=time],input[type=number],select,textarea{
  border:1.5px solid var(--border);border-radius:12px;padding:10px 12px;font-size:16px;
  width:100%;box-sizing:border-box;-webkit-appearance:none;appearance:none;background:#fff;color:var(--text);font-family:inherit;
}
textarea{resize:vertical;min-height:60px;}
.form-panel{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px;margin-top:10px;}
.form-actions{display:flex;gap:10px;margin-top:14px;}
.checkbox-row{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text-sub);}

/* checklist */
.check-row{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:10px 12px;margin-bottom:8px;}
.check-circle{
  width:22px;height:22px;border-radius:50%;border:2px solid var(--blue);flex-shrink:0;
  display:flex;align-items:center;justify-content:center;cursor:pointer;background:#fff;
}
.check-circle.checked{background:var(--green);border-color:var(--green);color:#fff;}
.check-text{flex:1;font-size:14px;}
.check-text.checked{text-decoration:line-through;color:var(--text-sub);}
.add-inline-row{display:flex;gap:8px;margin-top:10px;}

/* expenses */
.expense-total-card{
  background:var(--blue-dark);color:#fff;border-radius:18px;padding:18px;text-align:center;margin-bottom:14px;
}
.expense-total-label{font-size:12px;opacity:0.85;}
.expense-total-amount{font-size:28px;font-weight:700;margin-top:4px;}
.expense-row{display:flex;align-items:center;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:11px 12px;margin-bottom:8px;}
.expense-name{flex:1;font-size:14px;font-weight:700;}
.expense-amount{font-size:14px;font-weight:700;color:var(--blue-dark);margin-right:12px;}

/* calendar */
.calendar-toggle{display:flex;justify-content:flex-end;margin-bottom:8px;}
.cal-wrap{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:14px;margin-bottom:14px;}
.cal-month-title{font-weight:700;font-size:14px;margin-bottom:8px;text-align:center;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
.cal-dow{text-align:center;font-size:11px;color:var(--text-sub);font-weight:700;padding-bottom:4px;}
.cal-cell{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:10px;font-size:12px;cursor:default;position:relative;}
.cal-cell.trip-day{background:#E4EEF5;cursor:pointer;color:var(--blue-dark);font-weight:700;}
.cal-cell.trip-day.selected{background:var(--blue-dark);color:#fff;}
.cal-cell .dot{width:5px;height:5px;border-radius:50%;background:var(--pink);position:absolute;bottom:4px;}
.cal-cell.selected .dot{background:#fff;}

/* delete confirm */
.confirm-box{background:#FBEDEB;border:1px solid #E7C2BC;border-radius:12px;padding:12px;margin:12px 16px;text-align:center;}
.confirm-box p{font-size:13px;color:var(--red);margin:0 0 10px;}
.confirm-actions{display:flex;gap:10px;justify-content:center;}

.top-actions{display:flex;gap:8px;}

#print-view{display:none;}

@media print{
  #app > .topbar, #app > .drawer, #app > .overlay, .tabbar, .daytabbar, .tab-actions-noprint, .no-print{display:none !important;}
  #app{max-width:none;padding-bottom:0;}
  #screen-root{display:none !important;}
  #print-view{display:block !important;padding:20px;color:#000;}
  #print-view h1{font-size:22px;border-bottom:2px solid #333;padding-bottom:8px;}
  #print-view h2{font-size:16px;margin-top:22px;border-left:4px solid #333;padding-left:8px;}
  #print-view .p-item{margin:6px 0;padding:8px;border:1px solid #999;border-radius:6px;font-size:12px;}
  #print-view .p-list{font-size:12px;}
}
</style>
</head>
<body>
<div id="app">
  <div id="screen-root"></div>
  <div id="overlay" class="overlay"></div>
  <div id="drawer" class="drawer"></div>
</div>
<div id="print-view"></div>

<script>
/* ---------------- サンプルデータ ---------------- */
function uid(){ return 'id' + Date.now().toString(36) + Math.random().toString(36).slice(2,10); }

const CATS = {
  move:{label:'移動', bg:'#F5DCD4', text:'#A8452B', dot:'#C2603E'},
  meal:{label:'食事', bg:'#F5E9C8', text:'#8C6317', dot:'#C79A3D'},
  stay:{label:'宿泊', bg:'#E2D9F0', text:'#4F3A80', dot:'#7C63A8'},
  sightseeing:{label:'観光', bg:'#D3EDE0', text:'#276B4C', dot:'#4F9975'},
  other:{label:'その他', bg:'#E4E7EA', text:'#4B5563', dot:'#8B95A0'}
};

function sampleTrip(){
  return {
    id: uid(),
    emoji:'🗼',
    name:'フランス家族旅行',
    destination:'パリ',
    startDate:'2026-08-10',
    endDate:'2026-08-14',
    timezoneOffset:7, // JSTは現地時間よりこの時間だけ進んでいる
    members:['お父さん','お母さん','はると','ゆい'],
    archived:false,
    days:{
      '2026-08-10':[
        {id:uid(), time:'10:30', endTime:'19:45', title:'成田 → パリ 直行便', category:'move', location:'成田国際空港', arrivalLocation:'シャルル・ド・ゴール空港', arrivalIsLocalTime:true, memo:'機内食は事前予約済み', reservationNumber:'AF276-XR21K'},
        {id:uid(), time:'21:00', endTime:'', title:'ホテルにチェックイン', category:'stay', location:'ホテル・ド・ラ・セーヌ', arrivalLocation:'', arrivalIsLocalTime:false, memo:'', reservationNumber:''}
      ],
      '2026-08-11':[
        {id:uid(), time:'09:00', endTime:'12:00', title:'ルーヴル美術館', category:'sightseeing', location:'ホテル', arrivalLocation:'ルーヴル美術館', arrivalIsLocalTime:true, memo:'事前予約チケット持参', reservationNumber:''},
        {id:uid(), time:'12:30', endTime:'13:30', title:'ランチ', category:'meal', location:'カフェ・マルリー', arrivalLocation:'', arrivalIsLocalTime:false, memo:'', reservationNumber:''}
      ],
      '2026-08-12':[],
      '2026-08-13':[
        {id:uid(), time:'23:10', endTime:'01:20', title:'ナイトツアー(パリ→モンサンミッシェル泊)', category:'move', location:'パリ市内', arrivalLocation:'モンサンミッシェル', arrivalIsLocalTime:true, memo:'日付をまたぎます', reservationNumber:''}
      ],
      '2026-08-14':[
        {id:uid(), time:'15:00', endTime:'', title:'パリ → 成田 直行便', category:'move', location:'シャルル・ド・ゴール空港', arrivalLocation:'成田国際空港', arrivalIsLocalTime:false, memo:'', reservationNumber:'AF277-XR21K'}
      ]
    },
    packingList:[
      {id:uid(), text:'パスポート', checked:true},
      {id:uid(), text:'変換プラグ', checked:false},
      {id:uid(), text:'常備薬', checked:false}
    ],
    shoppingList:[
      {id:uid(), text:'水(ホテルで)', checked:false},
      {id:uid(), text:'お土産用チョコレート', checked:false}
    ],
    wishlist:[
      {id:uid(), text:'エッフェル塔で夜景を見る', location:'エッフェル塔', checked:false},
      {id:uid(), text:'クロワッサン食べ比べ', location:'', checked:false}
    ],
    todos:{
      pre:[{id:uid(), text:'海外旅行保険の加入', checked:false}, {id:uid(), text:'Wi-Fiルーターの予約', checked:true}],
      during:[{id:uid(), text:'家族グループに毎日1枚写真を送る', checked:false}],
      post:[{id:uid(), text:'現地通貨の精算', checked:false}]
    },
    reservations:[
      {id:uid(), category:'flight', name:'エールフランス航空', number:'AF276 / AF277', link:''},
      {id:uid(), category:'hotel', name:'ホテル・ド・ラ・セーヌ', number:'RSV-88213', link:''}
    ],
    expenses:[
      {id:uid(), name:'航空券', amount:68000},
      {id:uid(), name:'ホテル(4泊)', amount:132000}
    ]
  };
}

let state = {
  screen:'home',
  trips:[sampleTrip()],
  currentTripId:null,
  drawerOpen:false,
  showArchived:false,
  showAddTripForm:false,
  editingTripForm:false,
  detailTab:'schedule',
  scheduleDay:null,
  showCalendar:false,
  scheduleFormOpen:false,
  editingScheduleId:null,
  todoPhase:'pre',
  confirmDeleteTrip:false,
};

/* ---------------- ユーティリティ ---------------- */
function findTrip(id){ return state.trips.find(t=>t.id===id); }
function currentTrip(){ return findTrip(state.currentTripId); }
function escapeHtml(s){ return (s||'').toString().replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function pad(n){ return n.toString().padStart(2,'0'); }
function parseDate(dstr){ const [y,m,d]=dstr.split('-').map(Number); return new Date(y,m-1,d); }
function fmtDateJP(dstr){
  const d = parseDate(dstr);
  const w = ['日','月','火','水','木','金','土'][d.getDay()];
  return `${d.getMonth()+1}月${d.getDate()}日(${w})`;
}
function fmtDateShort(dstr){
  const d = parseDate(dstr);
  return `${d.getMonth()+1}/${d.getDate()}`;
}
function dateRangeArray(start,end){
  const arr=[]; let d=parseDate(start); const e=parseDate(end);
  while(d<=e){ arr.push(`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`); d.setDate(d.getDate()+1); }
  return arr;
}
function addDaysToDateStr(dstr, n){
  const d = parseDate(dstr); d.setDate(d.getDate()+n);
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}
function daysUntil(dstr){
  const today = new Date(); today.setHours(0,0,0,0);
  const target = parseDate(dstr);
  return Math.round((target-today)/86400000);
}
// JST計算: JSTはlocalよりoffsetHours進んでいる
function toJst(dateStr, timeStr, offsetHours){
  if(!timeStr) return null;
  const [h,m] = timeStr.split(':').map(Number);
  const base = parseDate(dateStr);
  base.setHours(h, m, 0, 0);
  const jst = new Date(base.getTime() + offsetHours*3600*1000);
  return jst;
}
function fmtDT(d){
  return `${d.getMonth()+1}/${d.getDate()} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}
function crossesNextDay(startTime, endTime){
  if(!startTime || !endTime) return false;
  return endTime < startTime;
}
function effectiveOffset(trip, item){
  return (item.timezoneOffset !== null && item.timezoneOffset !== undefined && item.timezoneOffset !== '')
    ? Number(item.timezoneOffset) : trip.timezoneOffset;
}
function gmapsUrl(q){
  return 'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(q);
}
function mapLinkHtml(text){
  return `<a href="${gmapsUrl(text)}" rel="noopener noreferrer" onclick="event.stopPropagation();" style="color:var(--blue-dark);text-decoration:underline;">${escapeHtml(text)} <span style="font-size:11px;">🔗</span></a>`;
}

/* ---------------- 描画メイン ---------------- */
function render(){
  const root = document.getElementById('screen-root');
  if(state.screen==='home') root.innerHTML = renderHomeScreen();
  else if(state.screen==='detail') root.innerHTML = renderDetailScreen();
  renderDrawer();
  renderPrintView();
  window.scrollTo(0,0);
}

/* ---------------- ホーム画面 ---------------- */
function renderHomeScreen(){
  if(state.loading){
    return `
    <div class="topbar">
      <button class="icon-btn" onclick="openDrawer()">☰</button>
      <h1>🌴 旅のしおり</h1>
      <div style="width:34px"></div>
    </div>
    <div class="home-content">
      <div class="empty-note" style="padding:60px 0;">読み込み中...</div>
    </div>`;
  }
  const upcoming = state.trips
    .filter(t=>!t.archived && parseDate(t.endDate) >= new Date(new Date().setHours(0,0,0,0)))
    .sort((a,b)=>parseDate(a.startDate)-parseDate(b.startDate));
  const trip = upcoming[0];

  let html = `
  <div class="topbar">
    <button class="icon-btn" onclick="openDrawer()">☰</button>
    <h1>🌴 旅のしおり</h1>
    <div style="width:34px"></div>
  </div>
  <div class="home-content">`;

  if(!trip){
    html += `
    <div class="empty-card">
      <div style="font-size:30px;">✨</div>
      <h2>次の旅行を計画しよう</h2>
      <p>まだ予定中の旅行がありません</p>
      <button class="btn-primary" onclick="openAddTripForm()">旅行を追加する</button>
    </div>`;
  } else {
    const dleft = daysUntil(trip.startDate);
    const dend = daysUntil(trip.endDate);
    let statusText;
    if(dleft>0) statusText = `あと${dleft}日`;
    else if(dend>=0) statusText = '旅行中!';
    else statusText = '今日から出発!';
    html += `
    <div class="countdown-card">
      <div class="countdown-emoji">${trip.emoji}</div>
      <div class="countdown-days">${statusText}</div>
      <div class="countdown-name">${escapeHtml(trip.name)}</div>
      <div class="countdown-dest">📍 ${escapeHtml(trip.destination)}</div>
      <div class="countdown-range">${fmtDateJP(trip.startDate)} 〜 ${fmtDateJP(trip.endDate)}</div>
    </div>`;

    const today = new Date();
    const todayStr = `${today.getFullYear()}-${pad(today.getMonth()+1)}-${pad(today.getDate())}`;
    const inRange = todayStr>=trip.startDate && todayStr<=trip.endDate;
    const targetDay = inRange ? todayStr : trip.startDate;
    const items = (trip.days[targetDay]||[]);

    html += `<div class="section-title">📅 Schedule</div>`;
    if(items.length===0){
      html += `<div class="empty-note">予定はまだありません</div>`;
    } else {
      items.forEach(it=>{ html += renderScheduleCard(trip, it, false); });
    }

    const phase = inRange ? 'during' : 'pre';
    const phaseLabel = inRange ? '(旅行中)' : '(旅行前)';
    const pending = (trip.todos[phase]||[]).filter(x=>!x.checked);
    html += `<div class="section-title">✅ To-Do${phaseLabel}</div>`;
    if(pending.length===0) html += `<div class="empty-note">未完了のタスクはありません</div>`;
    else pending.forEach(x=>{ html += `<div class="card" style="padding:10px 12px;">${escapeHtml(x.text)}</div>`; });

    const pendingShop = (trip.shoppingList||[]).filter(x=>!x.checked);
    html += `<div class="section-title">🛒 Shopping</div>`;
    if(pendingShop.length===0) html += `<div class="empty-note">買い忘れはなさそうです</div>`;
    else pendingShop.forEach(x=>{ html += `<div class="card" style="padding:10px 12px;">${escapeHtml(x.text)}</div>`; });

    html += `<button class="bottom-open-btn" onclick="openTrip('${trip.id}')">このしおりを開く</button>`;
  }

  html += `</div>`;
  return html;
}

function renderScheduleCard(trip, item, clickable){
  const cat = CATS[item.category]||CATS.other;
  const offset = effectiveOffset(trip, item);
  const jstStart = offset!==0 ? toJst(getItemDateForCard(trip,item), item.time, offset) : null;
  let jstLine = '';
  if(jstStart){
    let line = `🇯🇵 日本時間 ${fmtDT(jstStart)}`;
    if(item.endTime && item.arrivalIsLocalTime){
      const crosses = crossesNextDay(item.time, item.endTime);
      const endDateStr = crosses ? addDaysToDateStr(getItemDateForCard(trip,item),1) : getItemDateForCard(trip,item);
      const jstEnd = toJst(endDateStr, item.endTime, offset);
      line += ` 〜 ${fmtDT(jstEnd)}`;
    }
    jstLine = `<div class="jst-line">${line}</div>`;
  }
  const crosses = crossesNextDay(item.time, item.endTime);
  return `
  <div class="schedule-item">
    <div class="schedule-time-col">
      <div class="schedule-time-main">${item.time}</div>
      ${item.endTime?`<div class="schedule-time-sub">↓ ${item.endTime}${item.arrivalIsLocalTime?'(現地)':''}${crosses?'<span class=\"badge-nextday\">翌日</span>':''}</div>`:''}
    </div>
    <div class="schedule-body">
      <span class="cat-badge" style="background:${cat.bg};color:${cat.text}">${cat.label}</span>
      <div class="schedule-title">${escapeHtml(item.title)}</div>
      ${item.location||item.arrivalLocation?`<div class="schedule-loc">📍 ${item.location?mapLinkHtml(item.location):''}${item.arrivalLocation?' → '+mapLinkHtml(item.arrivalLocation):''}</div>`:''}
      ${item.reservationNumber?`<div class="schedule-loc">🎫 ${escapeHtml(item.reservationNumber)}</div>`:''}
      ${item.memo?`<div class="schedule-loc">${escapeHtml(item.memo)}</div>`:''}
      ${jstLine}
    </div>
  </div>`;
}
function getItemDateForCard(trip,item){
  for(const d in trip.days){ if(trip.days[d].includes(item)) return d; }
  return trip.startDate;
}

function saveTripForm(tripId){
  const name = document.getElementById('f-name').value.trim();
  const dest = document.getElementById('f-dest').value.trim();
  const start = document.getElementById('f-start').value;
  const end = document.getElementById('f-end').value;
  if(!name||!dest||!start||!end||end<start){ alert('旅行名・行き先・開始日・終了日(終了日は開始日以降)を入力してください'); return; }
  const emoji = document.getElementById('f-emoji').value;
  const tz = Number(document.getElementById('f-tz').value)||0;
  const members = Array.from(document.getElementById('member-chips').children).map(c=>c.childNodes[0].textContent.trim());

  if(tripId){
    const t = findTrip(tripId);
    t.name=name; t.destination=dest; t.emoji=emoji; t.timezoneOffset=tz; t.members=members;
    if(start!==t.startDate || end!==t.endDate){
      // 日程変更:daysオブジェクトを新しい範囲に合わせて調整(既存データは保持)
      const newDays={};
      dateRangeArray(start,end).forEach(d=>{ newDays[d] = t.days[d]||[]; });
      t.days = newDays;
      t.startDate=start; t.endDate=end;
      if(!newDays[state.scheduleDay]) state.scheduleDay = start;
    }
    state.editingTripForm=false;
  } else {
    const newTrip = {
      id:uid(), emoji, name, destination:dest, startDate:start, endDate:end, timezoneOffset:tz, members,
      archived:false, days:{}, packingList:[], shoppingList:[], wishlist:[],
      todos:{pre:[],during:[],post:[]}, reservations:[], expenses:[]
    };
    dateRangeArray(start,end).forEach(d=> newTrip.days[d]=[]);
    state.trips.push(newTrip);
    state.showAddTripForm=false;
  }
  render(); persist();
}

function renderCalendar(t, days){
  // 月ごとにグループ化してカレンダーグリッドを作る
  const months = {};
  days.forEach(d=>{
    const dt = parseDate(d);
    const key = `${dt.getFullYear()}-${pad(dt.getMonth()+1)}`;
    if(!months[key]) months[key]=[];
    months[key].push(d);
  });
  let html = `<div class="cal-wrap">`;
  Object.keys(months).forEach(key=>{
    const [y,m] = key.split('-').map(Number);
    const first = new Date(y, m-1, 1);
    const startWeekday = first.getDay();
    const daysInMonth = new Date(y, m, 0).getDate();
    html += `<div class="cal-month-title">${y}年${m}月</div>`;
    html += `<div class="cal-grid">`;
    ['日','月','火','水','木','金','土'].forEach(w=> html += `<div class="cal-dow">${w}</div>`);
    for(let i=0;i<startWeekday;i++) html += `<div class="cal-cell"></div>`;
    for(let day=1; day<=daysInMonth; day++){
      const dstr = `${y}-${pad(m)}-${pad(day)}`;
      const isTripDay = days.includes(dstr);
      const hasEvents = isTripDay && (t.days[dstr]||[]).length>0;
      const selected = dstr===state.scheduleDay;
      html += `<div class="cal-cell ${isTripDay?'trip-day':''} ${selected?'selected':''}" ${isTripDay?`onclick="selectScheduleDay('${dstr}')"`:''}>
        ${day}${hasEvents?'<span class="dot"></span>':''}
      </div>`;
    }
    html += `</div>`;
  });
  html += `</div>`;
  return html;
}

    </div>
    <div class="form-group">
      <label class="form-label">この予定の時差(空欄なら旅行全体の設定「日本が${t.timezoneOffset}時間進んでいる」を使用)</label>
      <input type="number" id="sf-tz" value="${editing&&editing.timezoneOffset!==null&&editing.timezoneOffset!==undefined?editing.timezoneOffset:''}" placeholder="例:台北なら1、ニューヨークなら13">
    </div>
    <div class="form-group">
      <label class="form-label">予約番号(任意)</label>
      <input type="text" id="sf-resv" value="${editing?escapeHtml(editing.reservationNumber||''):''}">
    </div>
    <div class="form-group">
      <label class="form-label">メモ(任意)</label>
      <textarea id="sf-memo">${editing?escapeHtml(editing.memo||''):''}</textarea>
    </div>
    <div class="form-actions">
      <button class="btn-primary full-width" onclick="saveSchedule('${t.id}')">${editing?'変更を保存':'この予定を追加'}</button>
      <button class="btn-secondary" onclick="cancelScheduleForm()">やめる</button>
    </div>
    ${editing?`<div style="text-align:center;margin-top:12px;"><button class="link-danger" onclick="deleteSchedule('${t.id}','${editing.id}')">この予定を削除</button></div>`:''}
  </div>`;
}
function cancelScheduleForm(){ state.scheduleFormOpen=false; state.editingScheduleId=null; render(); }
function saveSchedule(tripId){
  const t = findTrip(tripId);
  const time = document.getElementById('sf-time').value;
  const title = document.getElementById('sf-title').value.trim();
  if(!time||!title){ alert('開始時刻と予定名は必須です'); return; }
  const tzRaw = document.getElementById('sf-tz').value.trim();
  const data = {
    time, endTime: document.getElementById('sf-endtime').value,
    title, category: document.getElementById('sf-category').value,
    location: document.getElementById('sf-loc').value.trim(),
    arrivalLocation: document.getElementById('sf-arrloc').value.trim(),
    arrivalIsLocalTime: document.getElementById('sf-arrlocal').checked,
    timezoneOffset: tzRaw==='' ? null : Number(tzRaw),
    reservationNumber: document.getElementById('sf-resv').value.trim(),
    memo: document.getElementById('sf-memo').value.trim(),
  };
  if(!t.days[state.scheduleDay]) t.days[state.scheduleDay]=[];
  if(state.editingScheduleId){
    const idx = t.days[state.scheduleDay].findIndex(i=>i.id===state.editingScheduleId);
    t.days[state.scheduleDay][idx] = {...t.days[state.scheduleDay][idx], ...data};
  } else {
    t.days[state.scheduleDay].push({id:uid(), ...data});
  }
  state.scheduleFormOpen=false; state.editingScheduleId=null;
  render(); persist();
}
function deleteSchedule(tripId, itemId){
  const t = findTrip(tripId);
  t.days[state.scheduleDay] = (t.days[state.scheduleDay]||[]).filter(i=>i.id!==itemId);
  state.scheduleFormOpen=false; state.editingScheduleId=null;
  render(); persist();
}

/* ---- 持ち物/買うもの共通(チェックリスト) ---- */
function renderChecklistTab(t, field, title, mapLink){
  const list = t[field]||[];
  let html = `<div class="section-title" style="margin:0 0 10px;">${title}</div>`;
  list.forEach(item=>{
    html += `
    <div class="check-row">
      <div class="check-circle ${item.checked?'checked':''}" onclick="toggleCheck('${field}','${item.id}')">${item.checked?'✓':''}</div>
      <div class="check-text ${item.checked?'checked':''}">${mapLink?mapLinkHtml(item.text):escapeHtml(item.text)}</div>
      <button class="link-danger" onclick="deleteCheckItem('${field}','${item.id}')">削除</button>
    </div>`;
  });
  html += `
  <div class="add-inline-row">
    <input type="text" id="new-item-${field}" placeholder="項目を入力">

}
function toggleCheck(field,id){
  const t = currentTrip();
  const item = (t[field]||[]).find(i=>i.id===id);
  if(item) item.checked=!item.checked;
  render(); persist();
}
function deleteCheckItem(field,id){
  const t = currentTrip();
  t[field] = (t[field]||[]).filter(i=>i.id!==id);
  render(); persist();
}
function addCheckItem(field){
  const inp = document.getElementById('new-item-'+field);
  const v = inp.value.trim();
  if(!v) return;
  const t = currentTrip();
  if(!t[field]) t[field]=[];
  t[field].push({id:uid(), text:v, checked:false});
  render(); persist();
}

/* ---- やること(To-Do)タブ ---- */
function renderTodoTab(t){
  const phases = [{key:'pre',label:'旅行前'},{key:'during',label:'旅行中'},{key:'post',label:'旅行後'}];
  let html = `<div class="daytabbar" style="padding:0 0 10px;">`;
  phases.forEach(p=>{
    html += `<button class="day-btn ${state.todoPhase===p.key?'active':''}" onclick="state.todoPhase='${p.key}';render();">${p.label}</button>`;
  });
  html += `</div>`;
  const list = t.todos[state.todoPhase]||[];
  list.forEach(item=>{
    html += `
    <div class="check-row">
      <div class="check-circle ${item.checked?'checked':''}" onclick="toggleTodo('${item.id}')">${item.checked?'✓':''}</div>
      <div class="check-text ${item.checked?'checked':''}">${escapeHtml(item.text)}</div>
      <button class="link-danger" onclick="deleteTodo('${item.id}')">削除</button>
    </div>`;
  });
  html += `
  <div class="add-inline-row">
    <input type="text" id="new-todo" placeholder="やることを入力">
    <button class="btn-small" onclick="addTodo()">追加</button>
  </div>`;

}
function toggleTodo(id){
  const t = currentTrip();
  const item = (t.todos[state.todoPhase]||[]).find(i=>i.id===id);
  if(item) item.checked=!item.checked;
  render(); persist();
}
function deleteTodo(id){
  const t = currentTrip();
  t.todos[state.todoPhase] = (t.todos[state.todoPhase]||[]).filter(i=>i.id!==id);
  render(); persist();
}
function addTodo(){
  const inp = document.getElementById('new-todo');
  const v = inp.value.trim();
  if(!v) return;
  const t = currentTrip();
  t.todos[state.todoPhase].push({id:uid(), text:v, checked:false});
  render(); persist();
}

/* ---- 予約(Bookings)タブ ---- */

function deleteTripConfirmed(id){

/* ---------------- 印刷用ビュー ---------------- */
function printItinerary(){
  renderPrintView();
  window.print();
}
function renderPrintView(){
  const t = currentTrip();
  const el = document.getElementById('print-view');
  if(!t){ el.innerHTML=''; return; }
  const days = dateRangeArray(t.startDate, t.endDate);
  let html = `<h1>${t.emoji} ${escapeHtml(t.name)}</h1>
  <p>📍 ${escapeHtml(t.destination)} ／ ${fmtDateJP(t.startDate)} 〜 ${fmtDateJP(t.endDate)} ／ 時差:日本が${t.timezoneOffset}時間進んでいます</p>
  <p>参加メンバー:${(t.members||[]).join('、')}</p>`;

  days.forEach((d,i)=>{
    html += `<h2>Day${i+1} ${fmtDateJP(d)}</h2>`;
    const items = (t.days[d]||[]).slice().sort((a,b)=>(a.time||'').localeCompare(b.time||''));
    if(items.length===0) html += `<p class="p-list">予定なし</p>`;
    items.forEach(it=>{
      const cat = CATS[it.category]||CATS.other;
      const crosses = crossesNextDay(it.time, it.endTime);
      const offset = effectiveOffset(t, it);
      const jstStart = offset!==0 ? toJst(d, it.time, offset) : null;
      let jstText = jstStart ? `日本時間 ${fmtDT(jstStart)}` : '';
      html += `<div class="p-item">
        <b>[${cat.label}] ${it.time}${it.endTime?' 〜 '+it.endTime+(crosses?'(翌日)':''):''}</b> ${escapeHtml(it.title)}<br>
        ${it.location?('📍 '+escapeHtml(it.location)+(it.arrivalLocation?' → '+escapeHtml(it.arrivalLocation):'')+'<br>'):''}
        ${it.reservationNumber?('🎫 '+escapeHtml(it.reservationNumber)+'<br>'):''}
        ${it.memo?(escapeHtml(it.memo)+'<br>'):''}
        ${jstText?('🇯🇵 '+jstText):''}
      </div>`;
    });
  });

  html += `<h2>持ち物リスト</h2><p class="p-list">${(t.packingList||[]).map(x=>(x.checked?'☑':'☐')+' '+escapeHtml(x.text)).join('<br>')}</p>`;
  html += `<h2>買うものリスト</h2><p class="p-list">${(t.shoppingList||[]).map(x=>(x.checked?'☑':'☐')+' '+escapeHtml(x.text)).join('<br>')}</p>`;
  html += `<h2>行きたい場所・やりたいことリスト</h2><p class="p-list">${(t.wishlist||[]).map(x=>(x.checked?'☑':'☐')+' '+escapeHtml(x.text)+(x.location?'(📍'+escapeHtml(x.location)+')':'')).join('<br>')}</p>`;
  html += `<h2>やることリスト</h2>
    <p class="p-list"><b>旅行前</b><br>${(t.todos.pre||[]).map(x=>(x.checked?'☑':'☐')+' '+escapeHtml(x.text)).join('<br>')}</p>
    <p class="p-list"><b>旅行中</b><br>${(t.todos.during||[]).map(x=>(x.checked?'☑':'☐')+' '+escapeHtml(x.text)).join('<br>')}</p>
    <p class="p-list"><b>旅行後</b><br>${(t.todos.post||[]).map(x=>(x.checked?'☑':'☐')+' '+escapeHtml(x.text)).join('<br>')}</p>`;
  html += `<h2>予約情報</h2><p class="p-list">${(t.reservations||[]).map(r=>`[${RESV_CATS[r.category]||'その他'}] ${escapeHtml(r.name)} ${r.number?'('+escapeHtml(r.number)+')':''}`).join('<br>')}</p>`;
  const total = (t.expenses||[]).reduce((s,e)=>s+Number(e.amount||0),0);
  html += `<h2>費用(合計 ¥${total.toLocaleString()})</h2><p class="p-list">${(t.expenses||[]).map(e=>escapeHtml(e.name)+'：¥'+Number(e.amount).toLocaleString()).join('<br>')}</p>`;

  el.innerHTML = html;
}

/* ---------------- Firestore連携 ---------------- */
function persist(){
  if(window.persistTripsToFirestore){
    window.persistTripsToFirestore(state.trips);
  }
}
function showSaveError(){
  let el = document.getElementById('save-error-banner');
  if(!el){
    el = document.createElement('div');
    el.id = 'save-error-banner';
    el.style.cssText = 'position:fixed;top:0;left:0;right:0;background:#B23B2E;color:#fff;text-align:center;padding:8px 12px;font-size:12.5px;z-index:100;';
    el.textContent = '保存できませんでした。通信環境をご確認ください';
    document.body.appendChild(el);
  }
}
function hideSaveError(){
  const el = document.getElementById('save-error-banner');
  if(el) el.remove();
}
window.getInitialSampleTrips = function(){ return [sampleTrip()]; };
window.onFirestoreTripsUpdate = function(trips){
  state.trips = trips || [];
  state.loading = false;
  render();
};

/* ---------------- 初期化 ---------------- */
document.getElementById('overlay').addEventListener('click', closeDrawer);
state.trips = [];
state.loading = true;
render();

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
  import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyC21QMulfvV5SvSlQOOzQuqxaCh25Tmv9g",
    authDomain: "project-6898843431363420456.firebaseapp.com",
    projectId: "project-6898843431363420456",
    storageBucket: "project-6898843431363420456.firebasestorage.app",
    messagingSenderId: "890222405557",
    appId: "1:890222405557:web:d89816e2ecc430f85fdbfc"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const tripsDocRef = doc(db, 'appData', 'trips');

  window.persistTripsToFirestore = async function(trips){
    try{
      await setDoc(tripsDocRef, { value: trips });
      window.hideSaveError && window.hideSaveError();
    }catch(err){
      console.error('Firestore save error:', err);
      window.showSaveError && window.showSaveError();
    }
  };

  let initializedFromEmpty = false;
  onSnapshot(tripsDocRef, async (snap) => {
    if(snap.exists()){
      const data = snap.data().value || [];
      window.onFirestoreTripsUpdate(data);
    } else if(!initializedFromEmpty){
      initializedFromEmpty = true;
      const sample = window.getInitialSampleTrips();
      try{
        await setDoc(tripsDocRef, { value: sample });
      }catch(err){
        console.error('Firestore init error:', err);
        window.showSaveError && window.showSaveError();
        window.onFirestoreTripsUpdate(sample);
      }
    }
  }, (error) => {
    console.error('Firestore listen error:', error);
    window.showSaveError && window.showSaveError();
  });
</script>
